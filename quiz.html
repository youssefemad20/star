<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Quiz | Star</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="quiz.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="theme.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="img-logo">
            <a href="index.html"><img src="Img/star-logo-withbg-removebg-preview.png" alt="Logo"></a>
        </div>
        <div class="header-right">
            <nav id="nav-menu">
                <a href="index.html" data-i18n="nav-home">Home</a>
                <a href="index.html#Planets" data-i18n="nav-planets">Planets</a>
                <a href="gallery.html" data-i18n="nav-gallery">Gallery</a>
                <a href="quiz.html" class="active">Quiz</a>
                <a href="Spacer.html" data-i18n="nav-spacer-chat">Spacer Chat</a>
            </nav>
            <div class="hamburger-menu" id="hamburger-btn">
                <span></span><span></span><span></span>
            </div>
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark/Light Mode"></button>
            <select id="language-switcher">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>
    </header>

    <main class="quiz-main">
        <!-- Hero -->
        <section class="quiz-hero">
            <h1 data-i18n="quiz-title">Space Quiz 🚀</h1>
            <p data-i18n="quiz-subtitle">10 random questions — how well do you know the cosmos?</p>
        </section>

        <!-- Progress Bar -->
        <div class="quiz-progress-wrap" id="quiz-progress-wrap">
            <div class="quiz-progress-label">
                <span data-i18n="quiz-progress-label">Progress</span>
                <span><span id="quiz-progress-current">1</span> / 10</span>
            </div>
            <div class="quiz-progress-bar">
                <div class="quiz-progress-fill" id="quiz-progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="quiz-card" id="quiz-card">
            <div class="quiz-question-num" id="quiz-q-num">Question 1 of 10</div>
            <p class="quiz-question-text" id="quiz-q-text"></p>
            <div class="quiz-choices" id="quiz-choices"></div>
            <button class="quiz-next-btn" id="quiz-next-btn">Next Question →</button>
        </div>

        <!-- Result Screen -->
        <div class="quiz-result" id="quiz-result">
            <div class="quiz-result-trophy" id="quiz-trophy">🏆</div>
            <div class="quiz-result-score" id="quiz-result-score">0/10</div>
            <div class="quiz-result-label" id="quiz-result-label">Perfect!</div>
            <p class="quiz-result-msg" id="quiz-result-msg"></p>
            <button class="quiz-retry-btn" id="quiz-retry-btn">Try Again 🔄</button>
        </div>
    </main>

    <!-- Footer -->
    <footer data-i18n="footer-text">
        © 2025 Youssef Emad. All rights reserved.
    </footer>

    <script src="translations.js"></script>
    <script src="i18n.js"></script>
    <script src="quiz.js"></script>
    <script src="wow_facts.js"></script>
    <script>
        const hamburger = document.getElementById('hamburger-btn');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });
    </script>
</body>
</html>
